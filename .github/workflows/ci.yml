# CI: runs the Rust and Python test suites on every PR to main (and on
# pushes to main). Separate from build-ingestion-image.yml, which builds
# and pushes the container image only after its own test gate.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ingestion
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --release --all-targets -- -D warnings
      - name: test
        run: cargo test --release

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install deps
        # Only what the pure-logic unit tests transitively import
        # (loader/schema/ring-injector) plus pytest — deliberately NOT torch,
        # since the unit suite doesn't touch the model.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow azure-identity gremlinpython
          pip install -r tests/requirements.txt
      - name: pytest
        run: python -m pytest tests/unit -q
