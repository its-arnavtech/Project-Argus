# Chunk 10: builds the Rust ingestion service image in CI and pushes it to
# GHCR using the workflow's own GITHUB_TOKEN (packages:write) -- the local
# dev token deliberately has no packages scopes. The package is flipped to
# public once (manual, package settings UI) so Azure Container Apps pulls it
# anonymously; the image contains only the compiled release binary.
name: build-ingestion-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ingestion/**"
      - ".github/workflows/build-ingestion-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  # Chunk 10 addendum: a red test run must never reach an image that gets
  # deployed. This job gates the build-and-push job below via `needs` --
  # cargo test / clippy failing here means the push never happens.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ingestion
      - run: cargo test --release
        working-directory: ingestion
      - run: cargo clippy --release --all-targets -- -D warnings
        working-directory: ingestion

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ingestion
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argus-ingestion:chunk10
            ghcr.io/${{ github.repository_owner }}/argus-ingestion:latest
